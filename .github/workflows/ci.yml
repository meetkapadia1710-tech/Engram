name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/api/requirements.txt
      - run: pip install -r services/api/requirements.txt pytest
      - run: python -m pytest services/api/tests -q

  web:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm install --no-fund --no-audit
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web

  sdk:
    name: SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -c "from engram import Engram"
        working-directory: sdk/python
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-fund --no-audit && npm run build
        working-directory: sdk/typescript

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/api.Dockerfile .
