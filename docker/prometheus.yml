global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: engram

scrape_configs:
  # ── Engram API instances ────────────────────────────────────────────────
  - job_name: "engram-api"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "api-1:8000"
          - "api-2:8000"
          - "api-3:8000"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ── PostgreSQL exporter (optional, requires postgres-exporter sidecar) ──
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # ── Redis exporter (optional) ────────────────────────────────────────────
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # ── Node exporter (optional, for host metrics) ───────────────────────────
  # - job_name: "node"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]

  # ── Self-scrape ──────────────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
