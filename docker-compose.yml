services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENGRAM_DATABASE_URL: postgresql+psycopg://engram:engram@postgres:5432/engram
      ENGRAM_CORS_ORIGINS: http://localhost:3000
      SUPERMEMORY_URL: http://supermemory:6767
      # ENGRAM_API_KEYS: change-me            # uncomment to require auth
      # ENGRAM_EMBEDDING_PROVIDER: ollama     # local | openai | gemini | ollama
    volumes:
      - engram-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  supermemory:
    image: supermemory/local:latest
    ports:
      - "6767:6767"
    volumes:
      - supermemory-data:/app/data
    environment:
      - PORT=6767

volumes:
  engram-data:
  pg-data:
  supermemory-data:
